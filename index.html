<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The King & The People – MVP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #eee;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat {
      flex: 1;
    }

    .bar {
      position: relative;
      background: #444;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
    }

    .bar-value {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 0.8em;
      line-height: 20px;
      font-family: monospace;
      text-shadow: 0 0 2px rgba(0,0,0,0.8);
      pointer-events: none;
      width: 100%;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      cursor: pointer;
    }

    .card-button {
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      border: 2px solid #444;
      border-radius: 8px;
      padding: 0;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      height: 250px;
    }

    .card-button:hover {
      border-color: #2196f3;
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(33, 150, 243, 0.3);
    }

    .card-title {
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      border-bottom: 2px solid #444;
      padding: 12px;
      font-weight: bold;
      font-size: 0.95em;
      text-align: center;
      color: #fff;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-image {
      flex: 1;
      background: linear-gradient(135deg, rgba(33, 150, 243, 0.1), rgba(76, 175, 80, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      color: #444;
    }

    .card-indicators {
      background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
      border-top: 2px solid #444;
      padding: 10px;
      text-align: center;
      font-size: 1.3em;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .treasury-section {
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      border: 2px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
    }

    .treasury-label {
      color: #ffc107;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .treasury-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #ffc107;
      margin-top: 8px;
      text-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .treasury-display {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffeb3b;
      padding: 7px 10px;
      border: 2px solid #ffd700;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.7), inset 0 0 8px rgba(255, 215, 0, 0.5);
      margin-bottom: 10px;
      background: rgba(255, 223, 0, 0.05);
    }

    .treasury-emoji {
      margin-right: 7px;
    }

    .log {
      background: #111;
      padding: 10px;
      margin-top: 15px;
      min-height: 40px;
    }

    #history {
      margin-top: 30px;
      border-top: 2px solid #444;
      padding-top: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      margin-bottom: 12px;
    }

    .history-entry {
      background: #252525;
      border-left: 3px solid #2196f3;
      padding: 10px;
      border-radius: 4px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .history-age {
      color: #666;
      font-size: 0.9em;
    }

    .history-event {
      font-weight: bold;
      color: #fff;
    }

    .history-choice {
      color: #4caf50;
      margin-bottom: 5px;
      font-size: 0.95em;
    }

    .history-effects {
      color: #999;
      font-size: 0.85em;
    }

    #gameOverScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: auto;
    }

    #gameOverScreen .overlay-box {
      background: #222;
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      max-width: 90%;
    }

    #gameOverScreen h2 {
      margin-bottom: 14px;
      font-size: 1.6em;
    }
  </style>
</head>

<body>
  <h1>👑 The King & The People</h1>
  <h2>Age: <span id="age"></span></h2>
  <div class="treasury-display">💰 <span class="treasury-emoji">Treasury: £</span><span id="treasury-value"></span></div>

  <div class="stats">
    <div class="stat">
      Happiness
      <div class="bar"><div id="happiness" class="fill" style="background:#4caf50"></div><span id="happiness-value" class="bar-value"></span></div>
    </div>
    <div class="stat">
      Prosperity
      <div class="bar"><div id="prosperity" class="fill" style="background:#2196f3"></div><span id="prosperity-value" class="bar-value"></span></div>
    </div>
    <div class="stat">
      Loyalty
      <div class="bar"><div id="loyalty" class="fill" style="background:#ff9800"></div><span id="loyalty-value" class="bar-value"></span></div>
    </div>
  </div>

  <h2 id="eventName"></h2>
  <p id="eventText"></p>

  <h3>📣 The People Vote</h3>
  <div class="row">
    <div class="card-button" onclick="window.voteCardClick(0)">
      <div class="card-title" id="voteA-title"></div>
      <div class="card-image" id="voteA-image">🗳️</div>
      <div class="card-indicators" id="voteA-indicators"></div>
    </div>
    <div class="card-button" onclick="window.voteCardClick(1)">
      <div class="card-title" id="voteB-title"></div>
      <div class="card-image" id="voteB-image">🗳️</div>
      <div class="card-indicators" id="voteB-indicators"></div>
    </div>
  </div>
  Votes — A: <span id="votesA">0</span> | B: <span id="votesB">0</span>

  <h3>👑 The King Decides</h3>
  <div class="row">
    <div class="card-button" onclick="window.decideCardClick(0)">
      <div class="card-title" id="kingA-title"></div>
      <div class="card-image" id="kingA-image">👑</div>
      <div class="card-indicators" id="kingA-indicators"></div>
    </div>
    <div class="card-button" onclick="window.decideCardClick(1)">
      <div class="card-title" id="kingB-title"></div>
      <div class="card-image" id="kingB-image">👑</div>
      <div class="card-indicators" id="kingB-indicators"></div>
    </div>
  </div>

  <div class="log" id="log"></div>

  <button id="hackHappinessBtn" style="margin-top: 10px; padding: 8px; background: #ff5722; color: white; border: none; border-radius: 5px; cursor: pointer;">Set Happiness to -10 (debug)</button>

  <h3>📜 History of Decisions</h3>
  <div id="history"></div>

  <div id="gameOverScreen">
    <div class="overlay-box">
      <h2 id="gameOverText"></h2>
      <div class="treasury-section" style="margin: 20px 0;">
        <div class="treasury-label">💰 Final Treasury</div>
        <div class="treasury-value" id="finalTreasury">0</div>
      </div>
      <button id="restartBtn">Restart Game</button>
    </div>
  </div>

  <script type="module" src="./game/main.js"></script>
</body>
</html>
